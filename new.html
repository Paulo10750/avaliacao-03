<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grão Real Café - Registo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

      <header>
        <div class="nav-container">
            <div class="logo">
                <img src="Logo.png" alt="Logo Grão Real Café" class="logo-img">
                <h2>GRÃO <span>REAL</span></h2>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html" class="active">Início</a></li>
                    <li><a href="produto.html">Cardápio</a></li>
                    <li><a href="login.html">Entrar</a></li>
                    <li><a href="new.html">Registro</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="form-container" id="registo-seccao">
            
            <div class="alerta-sucesso">
                ☕ Registo concluído com sucesso!
            </div>

            <h1>Criar Nova Conta</h1>
            
            <form action="produto.html" method="GET">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" required placeholder="O seu nome completo">
                </div>

                <div class="form-group">
                    <label for="new-email">Endereço de E-mail</label>
                    <input type="email" id="new-email" name="email" required placeholder="exemplo@email.com">
                </div>

                <div class="form-group">
                    <label for="cafe-favorito">Café de Preferência</label>
                    <select id="cafe-favorito" name="cafe-favorito">
                        <option value="espresso">Espresso Intenso</option>
                        <option value="cappuccino">Cappuccino Cremoso</option>
                        <option value="filtrado">Café Filtrado V60</option>
                        <option value="coldbrew">Cold Brew Maturado</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="new-password">Definir Palavra-passe</label>
                    <input type="password" id="new-password" name="password" required placeholder="Mínimo 6 caracteres">
                </div>

                <button type="submit" class="btn-block">Finalizar Registo</button>
            </form>
            
            <div class="form-footer">
                <p>Já possui registo no nosso sistema? <a href="login.html">Entre aqui</a></p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Grão Real Café. Trabalho Académico - Todos os direitos reservados.</p>
    </footer>

</body>
</html>
